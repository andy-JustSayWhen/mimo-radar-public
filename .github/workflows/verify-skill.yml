name: Verify Skill

on:
  pull_request:
    paths:
      - "agent/skills/mimo-radar/SKILL.md"
      - "scripts/verify-skill-contract.mjs"
      - ".github/workflows/verify-skill.yml"
  push:
    branches: [main]
    paths:
      - "agent/skills/mimo-radar/SKILL.md"
      - "scripts/verify-skill-contract.mjs"
      - ".github/workflows/verify-skill.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/verify-skill-contract.mjs

